services:
  - type: web
    name: skycapital-funding-hub
    runtime: static
    buildCommand: bun install && bun run build
    publishPath: dist
    routes:
      # Rewrite rule to handle React Router client-side routing
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_SUPABASE_URL
        sync: false
      - key: VITE_SUPABASE_PUBLISHABLE_KEY
        sync: false
      - key: VITE_ZOHO_WEBHOOK_URL
        sync: false
